site_name: "Sharestream"  # Optional: defaults to "Sharestream" if not set
site_motto: "Your private video collection"  # Optional: displayed under logo on gallery pages
# Optional: social-embed (Open Graph) thumbnail shown when the home page or a
# static page is shared on social media. Point it at a raster image (jpg/png) —
# it is served as-is. Falls back to the favicon PNG, then a bundled default.
site_thumbnail: "./static/localized/og-thumbnail.jpg"
# Optional: one-sentence description used for og:description when the home page
# (and image-less static pages) are shared. Falls back to site_motto if unset.
site_description: "Your private video collection — stream and share."
social_links:  # Optional: social media links displayed at bottom of pages
  - name: "Bluesky"
    logo: "https://bsky.social/favicon.ico"
    url: "https://bsky.app/profile/example.bsky.social"
  - name: "Mastodon"
    logo: "./static/social_logos/mastodon.svg"
    url: "https://mastodon.social/@example"
  - name: "Forgejo"
    logo: "./static/social_logos/forgejo.svg"
    url: "https://codeberg.org/sharestream/sharestream"

# Font customization: To override fonts, place .woff2 files in ./static/localized/fonts/ with these exact names:
#   - motto_font.woff2    (for site motto text)
#   - title_font.woff2    (for headings)
#   - button_font.woff2   (for buttons)
#   - disclaimer_font.woff2 (for disclaimer text)
#   - base_font.woff2     (for body text)

sharestream:
  host: 127.0.0.1
  port: 6669
  base_domain: https://example.com
  admin_username: admin
  admin_password: your_secure_password
  default_resolution: MEDIUM # LOW MEDIUM OR HIGH
  share_id_length: 8
  # Optional: default sort mode for the home page and tag-share galleries.
  # One of: date | title | hits | rating | duration | random (defaults to 'date').
  # Individual tag shares can override this in the admin panel.
  default_sort: date
  # Optional. Signs admin sessions and per-share password-unlock cookies. If you
  # omit it, a key is generated once and persisted to ./.secret_key so logins and
  # share passwords survive restarts. Set an explicit value here (any long random
  # string) if you run multiple workers/nodes, so they all share one key.
  # secret_key: "change-me-to-a-long-random-string"

stash:
  server_ip: 127.0.0.1
  port: 5588
  api_key: yourStashAPIKeyGoesHere
  # limit_to_tag: 10844 # Optional: browsable pages (home + /gallery/tag) only show videos with BOTH the shared tag and this tag (by ID); a share's own pages stay limited only while featured on home with no password (password-protected or non-featured shares reach the full tag)

# Social-embed (og:video) policy for link previews on Lemmy/Mastodon/etc.
# mode: preview | full | dynamic   (can be overridden per-share in the admin panel)
#   preview = always embed the short Stash preview clip (good for long videos)
#   full    = always embed the full video
#   dynamic = embed the full video only when it is small on BOTH axes below,
#             otherwise fall back to the preview clip
embed:
  mode: dynamic
  max_full_duration: 60   # seconds (null/omit to ignore this limit)
  max_full_size_mb: 50    # megabytes (null/omit to ignore this limit)

# Gallery layout policy. Both default to false (omit the whole section to keep
# the classic cropped grid everywhere).
gallery:
  # How many video cards a gallery page shows (tag galleries paginate at this
  # size; the home page shows this many as a teaser). Defaults to 36 if omitted.
  per_page: 36
  # Optional separate teaser size for the home page (falls back to per_page).
  # home_per_page: 48
  # When true, the home page "All Videos" gallery (the individual video cards
  # below the featured collections) uses a masonry layout that keeps each
  # video's native aspect ratio, instead of cropping all cards to one shape.
  home_masonry: false
  # Default state of the admin "Gallery mode?" toggle when creating a tag share.
  # false = opt-in (new shares are standard grid unless you tick the box);
  # true = opt-out (new shares are masonry unless you untick it). This only sets
  # the default for NEW shares — existing shares keep whatever was saved.
  masonry_default: false

# Caching policy.
# Media requests (thumbnails, HLS segments, previews, mp4/webp) verify that a
# requested video belongs to a shared tag before proxying it from Stash. That
# membership check is cached per tag for this many minutes so repeated media
# hits don't re-query Stash every time. Defaults to 15 if omitted. You can clear
# it on demand from the admin panel ("Clear Cache") — useful right after you
# retag scenes in Stash and want a shared collection to reflect the change.
cache:
  tag_membership_ttl_minutes: 15
  # Generated collection (tag-share) social-embed thumbnails — a merged animated
  # WebP or a collage JPEG built from member videos — are cached on disk and
  # rebuilt when older than this. Defaults to 360 (6 hours) if omitted.
  collection_thumbnail_ttl_minutes: 360

# Optional public "filedrop" upload page (served at /filedrop). Visitors can
# upload video files that are ingested into your Stash. DISABLED unless
# ``enabled: true``.
#
# Two delivery modes:
#   local: false  (default) — SSH/SFTP the file to the host running Stash.
#   local: true             — copy the file directly on the local filesystem
#                             (use when sharestream and Stash run on the same
#                             machine). SSH settings are ignored in this mode.
#
# host_dir is the path where bytes are written; stash_scan_path is THAT SAME
# FOLDER as Stash sees it. They differ when Stash runs in a container with a
# bind mount (e.g. host /mnt/Media -> container /data, so a host path of
# /mnt/Media/XXX/_filedrop is /data/XXX/_filedrop inside Stash). When Stash runs
# natively, set both to the same path.
filedrop:
  enabled: false
  password: ""                          # optional; empty = open page
  # List of Stash tag ids applied to every upload. If one of these tags also has
  # a PUBLIC (no-password) tag share — and the limit_to_tag requirement is met
  # (limit_to_tag unset, the share bypasses it, or limit_to_tag is also in this
  # list) — the upload is viewable immediately and the uploader gets a view link.
  new_upload_tags: []
  # tag_id:                             # deprecated single-tag form; still honored as new_upload_tags fallback
  # When an upload is NOT auto-viewable via a public tag (above), mint a
  # password-protected share link with a random password and show it to the
  # uploader when processing completes. Off by default.
  auto_share_uploads: false
  # Let uploaders pick their own tags for an upload. The picker only offers tags
  # that are already publicly browsable (carried by a video in any no-password
  # share, i.e. reachable via /gallery/tag/{name}); server-side validation
  # rejects anything outside that set. Off by default.
  allow_user_tags: false
  # Set to true to copy files locally instead of using SSH/SFTP.
  # When local is true, the ssh_* settings below are ignored.
  local: false
  # SSH/SFTP delivery (only used when local: false).
  ssh_host: 127.0.0.1
  ssh_user: youruser
  ssh_key: ~/.ssh/id_ed25519            # SSH private key for passwordless delivery
  ssh_port: 22
  host_dir: /mnt/Media/XXX/_filedrop    # where bytes are SFTP'd (path on ssh_host)
  stash_scan_path: /data/XXX/_filedrop  # same folder as Stash sees it (container path)
  max_upload_mb: 5000                   # reject uploads larger than this

# SMTP configuration for DMCA takedown requests
contact_form:
  mailto: where@takedowns.go  # Email address to receive DMCA requests
  host: mail.myemailserver.com  # SMTP server hostname
  port: 465  # SMTP port (typically 465 for SSL/TLS, 587 for STARTTLS)
  user: me@myemailserver.com  # SMTP username
  pass: my_SMTP_passw0rd  # SMTP password

# Optional content warning / age gate. If set, first-time visitors to the home
# page see a frosted-glass overlay with this message and an "Enter" button;
# clicking it sets a cookie so they aren't prompted again. Omit/leave empty to disable.
content_warning: "This site contains sexually explicit material intended only for adults. By entering, you confirm that you are at least 18 years old (or the age of majority in your jurisdiction) and that you wish to view such content."

disclaimer: "This content is shared for private use only. Unauthorized distribution is prohibited. This site does not encourage/condone illegal sexual conduct and is intended solely to provide visual pleasure for ADULTS only. Please leave this site if you are under 18 or if you find mature/explicit content offensive. All mature/explicit content on this site is strictly in compliance with 18 U.S.C. § Code 2257 i.e. all performers featured are 18 years or older of age. This site and all its associated domains being in accordance with 17 U.S.C. § 512 and the Digital Millennium Copyright Act, responds to infringement notices within 24 hours."

# Site-wide footer (shown below social icons, above the disclaimer).
# action_links = pill buttons; links = small inline text links (· separated).
# Omit the entire ``footer`` key to keep the legacy single DMCA button.
footer:
  action_links:
    - label: Join Community
      href: /community
      style: primary       # light-green accent
    - label: DMCA Takedown Request
      href: /dmca
      style: secondary     # purple accent (legacy DMCA button styling)
  links:
    - label: Terms
      href: /terms
    - label: Privacy
      href: /privacy
    - label: Content Policy
      href: /content-policy
    - label: DMCA
      href: /dmca
    - label: Community
      href: /community

