<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} - {{ site_name or 'Sharestream' }}</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/fonts.css">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
</head>
<body{% if show_content_warning %} class="cw-locked"{% endif %}>
    {% include "content-warning.html" %}
    <div class="container">
        <header>
            <a href="{{ base_domain }}">
                <img src="{{ logo_path }}" srcset="{{ srcset }}" alt="Logo" class="logo">
            </a>
            {% if site_motto %}
            <div class="site-motto">{{ site_motto }}</div>
            {% endif %}
        </header>

        <article class="markdown-page">
            <h1 class="markdown-page-title">{{ page_title }}</h1>
            <div class="markdown-body">
                {{ content_html | safe }}
            </div>
        </article>

        {% if social_links %}
        <div class="social-links">
            {% for link in social_links %}
            <a href="{{ link.url }}" target="_blank" rel="{% if link.rel %}{{ link.rel }} {% endif %}noopener noreferrer" title="{{ link.name }}">
                <img src="{% if link.logo.startswith('http') %}{{ link.logo }}{% else %}/{{ link.logo.lstrip('./') }}{% endif %}"
                     {% if link.logo_2x %}srcset="{% if link.logo_2x.startswith('http') %}{{ link.logo_2x }}{% else %}/{{ link.logo_2x.lstrip('./') }}{% endif %} 2x{% if link.logo_3x %}, {% if link.logo_3x.startswith('http') %}{{ link.logo_3x }}{% else %}/{{ link.logo_3x.lstrip('./') }}{% endif %} 3x{% endif %}"{% endif %}
                     alt="{{ link.name }}"
                     width="64" height="64">
            </a>
            {% endfor %}
        </div>
        {% endif %}

        {% include "footer.html" %}
    </div>
</body>
</html>
